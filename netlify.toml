[build]
  base = "client"
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"

[functions]
  
  [functions.node_version]
    external_node_modules = []

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/handler"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run start"
  targetPort = 3000
  publish = "build"
